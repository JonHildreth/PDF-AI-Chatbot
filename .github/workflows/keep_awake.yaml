name: Keep App Awake

on:
  schedule:
    # This runs once every day at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -s https://your-app-name-here.streamlit.app > /dev/null